apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: express-app-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: express-app.local
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: express-app-service
            port:
              number: 80

